# Railway Deployment Configuration
# See: https://docs.railway.com/deploy/config-as-code

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "/app/entrypoint.sh"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
numReplicas = 1

# NOTE: Resource allocation (memory, CPU) is not configurable in railway.toml.
# Use the Railway dashboard or API to set resource limits.
