services:
  randal:
    build: .
    ports:
      - "7600:7600"
    volumes:
      - ./randal.config.yaml:/app/randal.config.yaml:ro
      - ./.env:/app/.env:ro
      - ./workspace:/app/workspace
      - meili_data:/app/meili-data
    environment:
      - RANDAL_API_TOKEN=${RANDAL_API_TOKEN}
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}

volumes:
  meili_data:
