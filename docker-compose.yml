services:
  randal:
    build: .
    ports:
      - "7600:7600"
    volumes:
      - ./randal.config.yaml:/app/randal.config.yaml:ro
      - ./.env:/app/.env:ro
      - ./workspace:/app/workspace
      - meili_data:/app/meili-data
    env_file:
      - .env
    environment:
      - GH_TOKEN=${GH_TOKEN:-}

volumes:
  meili_data:
