# Browser-only voice Randal instance
# Requires: LiveKit + STT/TTS config. Does not require Twilio.

name: browser-voice-assistant

runner:
  workdir: ./workspace
  defaultAgent: opencode
  defaultModel: anthropic/claude-sonnet-4

gateway:
  channels:
    - type: http
      port: 7600
      auth: ${API_TOKEN}

voice:
  enabled: true
  livekit:
    url: ${LIVEKIT_URL}
    apiKey: ${LIVEKIT_API_KEY}
    apiSecret: ${LIVEKIT_API_SECRET}
  stt:
    provider: deepgram
    apiKey: ${DEEPGRAM_API_KEY}
  tts:
    provider: edge
    voice: en-US-GuyNeural

capabilities: [memory]

credentials:
  envFile: ./.env
  allow:
    - API_TOKEN
    - LIVEKIT_URL
    - LIVEKIT_API_KEY
    - LIVEKIT_API_SECRET
    - DEEPGRAM_API_KEY
