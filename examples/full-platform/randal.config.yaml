# Full-platform Randal configuration
# All features enabled: voice, mesh, analytics, browser, multiple channels
# See the docs/ directory for setup guides for each feature
#
# Run `randal setup` to generate opencode.json from this config.

name: randal-full

runner:
  workdir: ./workspace
  defaultAgent: opencode
  defaultModel: anthropic/claude-sonnet-4
  defaultMaxIterations: 25
  maxDelegationDepth: 2
  maxDelegationsPerIteration: 3
  struggle:
    noChangeThreshold: 3
    maxRepeatedErrors: 3
    action: warn
  mcpServer:
    enabled: true
    port: 7601
    tools:
      - memory_search
      - context
      - status
      - skills
      - annotate
  compaction:
    enabled: true
    threshold: 0.8
    model: anthropic/claude-haiku-3
    maxSummaryTokens: 2000

identity:
  persona: >
    You are a full-featured software engineering assistant with voice
    capabilities, browser automation, mesh collaboration, and self-learning.
    Adapt your communication style to the channel: concise speech for voice,
    detailed markdown for text channels.
  knowledge:
    - ./knowledge/codebase-overview.md
  rules:
    - Use voice-appropriate responses when on a call
    - Delegate tasks outside your expertise to mesh peers — the router handles matching automatically
    - Self-evaluate work quality after each task
    - Use browser tools for web research and testing

gateway:
  channels:
    - type: http
      port: 7600
      auth: ${API_TOKEN}
      corsOrigin: ${CORS_ORIGIN}
    - type: voice
      access:
        trustedCallers:
          - ${ADMIN_CALLER_E164}
        unknownInbound: external
        defaultExternalGrants: [memory, events]
    - type: discord
      token: ${DISCORD_BOT_TOKEN}
      allowFrom:
        - "${DISCORD_ALLOWED_USER}"

voice:
  enabled: true
  livekit:
    url: ${LIVEKIT_URL}
    apiKey: ${LIVEKIT_API_KEY}
    apiSecret: ${LIVEKIT_API_SECRET}
  twilio:
    accountSid: ${TWILIO_ACCOUNT_SID}
    authToken: ${TWILIO_AUTH_TOKEN}
    phoneNumber: ${TWILIO_PHONE_NUMBER}
  stt:
    provider: deepgram
    apiKey: ${DEEPGRAM_API_KEY}
    model: nova-2
  tts:
    provider: elevenlabs
    apiKey: ${ELEVENLABS_API_KEY}
    voice: pNInz6obpgDQGcFmaJgB
  turnDetection:
    mode: auto
  video:
    enabled: true
    visionModel: gpt-4o
    publishScreen: false
    recordSessions: true
    recordPath: ./recordings

mesh:
  enabled: true
  role: product-engineering
  expertise: >
    Full-stack software engineering with voice, browser, and mesh
    capabilities. Handles React frontends, Node.js backends, database
    design, and API development. Generalist with broad coverage across
    the product engineering domain.
  endpoint: ${MESH_ENDPOINT}
  routingWeights:
    expertise: 0.4
    reliability: 0.3
    load: 0.2
    modelMatch: 0.1

analytics:
  enabled: true
  autoAnnotationPrompt: true
  feedbackInjection: true
  recommendationFrequency: weekly
  domainKeywords:
    product-engineering:
      - react
      - typescript
      - api
      - component
      - database
      - migration
    platform-infrastructure:
      - docker
      - kubernetes
      - terraform
      - deploy
      - ci
      - monitoring
    security-compliance:
      - security
      - vulnerability
      - audit
      - compliance
    data-intelligence:
      - analytics
      - pipeline
      - ml
      - dashboard
    design-experience:
      - design
      - ux
      - accessibility
      - figma
    content-communications:
      - docs
      - readme
      - blog
      - changelog
    revenue-growth:
      - sales
      - pricing
      - conversion
      - growth
    customer-operations:
      - support
      - onboarding
      - ticket
      - churn
    strategy-finance:
      - roadmap
      - okr
      - budget
      - sprint
    legal-governance:
      - contract
      - license
      - policy
      - compliance
  agingHalfLife: 30

# Capabilities: controls which MCP servers and tool permissions are wired
# into the generated opencode.json when you run `randal setup`.
# This full-platform config enables all available capabilities.
capabilities: [memory, search, video, image-gen, scheduler]

browser:
  enabled: true
  headless: true
  profileDir: ./browser-profile
  sandbox: false
  viewport:
    width: 1280
    height: 720
  timeout: 30000

memory:
  store: meilisearch
  url: ${MEILISEARCH_URL}
  apiKey: ${MEILISEARCH_API_KEY}
  embedder:
    type: openai
    model: text-embedding-3-large
    apiKey: ${OPENAI_API_KEY}
  sharing:
    publishTo: shared-mesh-index
    readFrom:
      - shared-mesh-index
  autoInject:
    enabled: true
    maxResults: 5

skills:
  dir: ./skills
  autoDiscover: true
  maxPerPrompt: 5
  sharing:
    publishTo: shared-mesh-index
    readFrom:
      - shared-mesh-index

heartbeat:
  enabled: true
  every: 30m
  prompt: ./HEARTBEAT.md
  activeHours:
    start: "08:00"
    end: "22:00"
    timezone: America/Los_Angeles

cron:
  jobs:
    daily-review:
      schedule:
        at: "09:00"
      prompt: Review open PRs and summarize status
      execution: isolated
      announce: true
    weekly-analytics:
      schedule:
        every: 7d
      prompt: Generate weekly analytics report and recommendations
      execution: isolated
      announce: true

credentials:
  envFile: ./.env
  allow:
    - API_TOKEN
    - CORS_ORIGIN
    - DISCORD_BOT_TOKEN
    - DISCORD_ALLOWED_USER
    - LIVEKIT_URL
    - LIVEKIT_API_KEY
    - LIVEKIT_API_SECRET
    - TWILIO_ACCOUNT_SID
    - TWILIO_AUTH_TOKEN
    - TWILIO_PHONE_NUMBER
    - ADMIN_CALLER_E164
    - DEEPGRAM_API_KEY
    - ELEVENLABS_API_KEY
    - OPENAI_API_KEY
    - MEILISEARCH_URL
    - MEILISEARCH_API_KEY
    - MESH_ENDPOINT
    - MESH_PEERS

sandbox:
  enforcement: env-scrub
  pathFilter:
    mode: allowlist
    allow:
      - ./workspace
      - ./skills
      - ./knowledge
      - ./recordings
      - ./browser-profile
  homeAccess:
    ssh: true
    gitconfig: true
    docker: true
    aws: false
