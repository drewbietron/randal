# Randal Headless Configuration for Railway Deployment
# This config is optimized for running Randal as an API service in the cloud

name: randal-railway

runner:
  defaultAgent: opencode
  # Use OpenRouter for multi-model access, or set to anthropic/claude-sonnet-4 for direct Anthropic
  defaultModel: "openrouter/qwen/qwen3.6-plus"
  workdir: /app/workspace

credentials:
  envFile: ./.env
  allow:
    - ANTHROPIC_API_KEY      # Optional - for direct Anthropic access
    - OPENROUTER_API_KEY     # Alternative - access multiple models via OpenRouter
    - OPENAI_API_KEY         # Optional - for direct OpenAI access
    - RANDAL_API_TOKEN
    - RANDAL_HOOK_TOKEN
    - TAVILY_API_KEY
    - MEILI_MASTER_KEY
    - GH_TOKEN
    - DISCORD_BOT_TOKEN
    - FAL_KEY
    - ELEVENLABS_API_KEY
    - ELEVENLABS_VOICE_ID
    - RANDAL_VOICE_PUBLIC_URL
    - LIVEKIT_URL
    - LIVEKIT_API_KEY
    - LIVEKIT_API_SECRET
    - DEEPGRAM_API_KEY
    - TWILIO_ACCOUNT_SID
    - TWILIO_AUTH_TOKEN
    - TWILIO_PHONE_NUMBER
    - RAILWAY_TOKEN           # Railway CLI / MCP server authentication
  # On Railway, secrets are injected as process env vars (not .env file).
  # 'inherit' passes parent process env vars through to the agent subprocess.
  inherit:
    - PATH
    - HOME
    - USER
    - SHELL
    - TERM
    - ANTHROPIC_API_KEY
    - OPENROUTER_API_KEY
    - OPENAI_API_KEY
    - TAVILY_API_KEY
    - GH_TOKEN
    - FAL_KEY
    - ELEVENLABS_API_KEY
    - ELEVENLABS_VOICE_ID
    - RANDAL_VOICE_PUBLIC_URL
    - LIVEKIT_URL
    - LIVEKIT_API_KEY
    - LIVEKIT_API_SECRET
    - DEEPGRAM_API_KEY
    - TWILIO_ACCOUNT_SID
    - TWILIO_AUTH_TOKEN
    - TWILIO_PHONE_NUMBER
    - MEILI_MASTER_KEY
    - RAILWAY_TOKEN

gateway:
  channels:
    - type: http
      port: 7600
      auth: "${RANDAL_API_TOKEN}"
    # Voice is optional. Keep this channel enabled only when the public voice/media host
    # and Twilio/LiveKit credentials are configured for this deployment.
    - type: voice
    - type: discord
      token: "${DISCORD_BOT_TOKEN}"
      allowFrom:
        - "${DISCORD_ALLOW_FROM}"

voice:
  enabled: true
  livekit:
    url: "${LIVEKIT_URL}"
    apiKey: "${LIVEKIT_API_KEY}"
    apiSecret: "${LIVEKIT_API_SECRET}"
  twilio:
    accountSid: "${TWILIO_ACCOUNT_SID}"
    authToken: "${TWILIO_AUTH_TOKEN}"
    phoneNumber: "${TWILIO_PHONE_NUMBER}"
  stt:
    provider: deepgram
    apiKey: "${DEEPGRAM_API_KEY}"
  tts:
    provider: elevenlabs
    apiKey: "${ELEVENLABS_API_KEY}"
    voice: "${ELEVENLABS_VOICE_ID}"

memory:
  store: meilisearch
  url: "${MEILISEARCH_URL:-http://127.0.0.1:7700}"
  apiKey: "${MEILI_MASTER_KEY}"
  index: memory-railway

identity:
  persona: |
    You are Randal, an autonomous AI agent running in the cloud on Railway.
    You help users with software engineering and creative tasks via the HTTP gateway API.
    You're headless (no TUI), so all interactions are through the API or scheduled tasks.

heartbeat:
  enabled: true
  every: 30m
  prompt: |
    Review any pending tasks and check for jobs that need attention.
  activeHours:
    start: "00:00"
    end: "23:59"

sandbox:
  enforcement: env-scrub

# When voice is enabled, set RANDAL_VOICE_PUBLIC_URL to the public HTTPS host that Twilio can reach.
# Keep the gateway/runner on Railway, and terminate Twilio SIP/media on a public voice host as documented
# in docs/voice-deployment-split.md.
