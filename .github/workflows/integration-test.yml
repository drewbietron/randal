name: Integration Tests (Railway)

on:
  pull_request:
    paths:
      - "Dockerfile"
      - "docker/**"
      - "packages/gateway/**"
      - "packages/runner/**"
      - "packages/scheduler/**"
      - "packages/cli/**"
      - "packages/core/**"
      - "randal.config.railway.yaml"
      - "randal.config.ci.yaml"
      - "tests/integration/smoke.sh"
      - ".github/workflows/integration-test.yml"
  workflow_dispatch: # manual trigger

env:
  RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
  RAILWAY_WORKSPACE_ID: ${{ secrets.RAILWAY_WORKSPACE_ID }}
  PROJECT_NAME: randal-ci-${{ github.run_id }}
  RAILWAY_API: https://backboard.railway.com/graphql/v2

jobs:
  integration-test:
    name: Deploy & Smoke Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Generate auth tokens for this run
      - name: Generate auth tokens
        run: |
          echo "RANDAL_API_TOKEN=$(uuidgen)" >> "$GITHUB_ENV"
          echo "MEILI_MASTER_KEY=$(uuidgen)" >> "$GITHUB_ENV"

      # Create an ephemeral Railway project for this CI run
      # NOTE: `railway project create` does not exist. `railway init --name` requires
      # interactive workspace selection when the token has access to multiple workspaces.
      # The Railway GraphQL API is the only reliable non-interactive approach.
      - name: Create Railway project
        id: create-project
        run: |
          echo "Creating Railway project: $PROJECT_NAME"

          # Build the GraphQL payload safely with jq + GraphQL variables.
          # We only need project ID + environment ID from the create response.
          # Services are always created explicitly below (projectCreate may not
          # include auto-created services in its response).
          if [ -n "$RAILWAY_WORKSPACE_ID" ]; then
            PAYLOAD=$(jq -n --arg name "$PROJECT_NAME" --arg ws "$RAILWAY_WORKSPACE_ID" \
              '{query: "mutation ($name: String!, $ws: String!) { projectCreate(input: {name: $name, workspaceId: $ws}) { id name environments { edges { node { id name } } } } }", variables: {name: $name, ws: $ws}}')
          else
            PAYLOAD=$(jq -n --arg name "$PROJECT_NAME" \
              '{query: "mutation ($name: String!) { projectCreate(input: {name: $name}) { id name environments { edges { node { id name } } } } }", variables: {name: $name}}')
          fi

          RESULT=$(curl -s -X POST "$RAILWAY_API" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          echo "API Response: $RESULT"

          # Validate the response
          PROJECT_ID=$(echo "$RESULT" | jq -r '.data.projectCreate.id')
          ENV_ID=$(echo "$RESULT" | jq -r '.data.projectCreate.environments.edges[0].node.id')

          if [ -z "$PROJECT_ID" ] || [ "$PROJECT_ID" = "null" ]; then
            echo "ERROR: Failed to create Railway project"
            echo "$RESULT" | jq .
            exit 1
          fi

          echo "Project created: $PROJECT_ID"
          echo "Environment: $ENV_ID"

          # Always create a service explicitly — don't rely on auto-created
          # services from projectCreate (they may not appear in the response).
          echo "Creating service..."
          SVC_PAYLOAD=$(jq -n --arg pid "$PROJECT_ID" \
            '{query: "mutation ($pid: String!) { serviceCreate(input: {name: \"randal\", projectId: $pid}) { id name } }", variables: {pid: $pid}}')
          SVC_RESULT=$(curl -s -X POST "$RAILWAY_API" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$SVC_PAYLOAD")
          echo "Service API Response: $SVC_RESULT"

          SERVICE_ID=$(echo "$SVC_RESULT" | jq -r '.data.serviceCreate.id')
          if [ -z "$SERVICE_ID" ] || [ "$SERVICE_ID" = "null" ]; then
            echo "ERROR: Failed to create Railway service"
            echo "$SVC_RESULT" | jq .
            exit 1
          fi
          echo "Service created: $SERVICE_ID"

          # Export IDs as environment variables for subsequent steps.
          echo "RAILWAY_PROJECT_ID=$PROJECT_ID" >> "$GITHUB_ENV"
          echo "RAILWAY_SERVICE_ID=$SERVICE_ID" >> "$GITHUB_ENV"
          echo "RAILWAY_ENVIRONMENT_ID=$ENV_ID" >> "$GITHUB_ENV"

          echo "project_id=$PROJECT_ID" >> "$GITHUB_OUTPUT"
          echo "project_created=true" >> "$GITHUB_OUTPUT"

      # Set environment variables on the Railway service via GraphQL API.
      # `railway variable set` has no --project flag and unreliable env var
      # support for ephemeral projects, so we use the API directly.
      - name: Set environment variables
        run: |
          upsert_var() {
            local key="$1" val="$2"
            PAYLOAD=$(jq -n \
              --arg pid "$RAILWAY_PROJECT_ID" \
              --arg sid "$RAILWAY_SERVICE_ID" \
              --arg eid "$RAILWAY_ENVIRONMENT_ID" \
              --arg k "$key" \
              --arg v "$val" \
              '{query: "mutation ($input: VariableUpsertInput!) { variableUpsert(input: $input) }",
                variables: {input: {projectId: $pid, serviceId: $sid, environmentId: $eid, name: $k, value: $v}}}')
            RESULT=$(curl -sf -X POST "$RAILWAY_API" \
              -H "Authorization: Bearer $RAILWAY_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD")
            echo "  Set $key"
          }

          echo "Setting environment variables..."
          upsert_var "RANDAL_API_TOKEN" "$RANDAL_API_TOKEN"
          upsert_var "MEILI_MASTER_KEY" "$MEILI_MASTER_KEY"
          upsert_var "RANDAL_CONFIG" "randal.config.ci.yaml"
          upsert_var "PORT" "7600"

          # Only set OpenRouter key if available (needed for job submission test)
          if [[ -n "${{ secrets.OPENROUTER_API_KEY }}" ]]; then
            upsert_var "OPENROUTER_API_KEY" "${{ secrets.OPENROUTER_API_KEY }}"
          fi
          echo "Environment variables set."

      # Deploy via Railway API — connect the service to the GitHub repo
      # so Railway pulls and builds from source. No CLI needed.
      - name: Deploy to Railway
        run: |
          echo "Deploying via Railway API (serviceConnect)..."
          echo "  Project:     $RAILWAY_PROJECT_ID"
          echo "  Service:     $RAILWAY_SERVICE_ID"
          echo "  Environment: $RAILWAY_ENVIRONMENT_ID"
          echo "  Repo:        drewbietron/randal"
          echo "  Branch:      ${{ github.head_ref || github.ref_name }}"

          # Connect service to GitHub repo — triggers an auto-deploy from source.
          # Railway's GitHub integration builds from the repo's Dockerfile.
          CONNECT_RESULT=$(curl -s -X POST "$RAILWAY_API" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg sid "$RAILWAY_SERVICE_ID" \
              --arg repo "drewbietron/randal" \
              --arg branch "${{ github.head_ref || github.ref_name }}" \
              '{query: "mutation($id: String!, $input: ServiceConnectInput!) { serviceConnect(id: $id, input: $input) { id } }",
                variables: {id: $sid, input: {repo: $repo, branch: $branch}}}')")
          echo "Connect result: $CONNECT_RESULT"

          # Validate the response
          CONNECTED_ID=$(echo "$CONNECT_RESULT" | jq -r '.data.serviceConnect.id')
          if [ -z "$CONNECTED_ID" ] || [ "$CONNECTED_ID" = "null" ]; then
            echo "ERROR: Failed to connect service to GitHub repo"
            echo "$CONNECT_RESULT" | jq .
            exit 1
          fi
          echo "Service connected — deployment triggered from GitHub repo"

      # Wait for the deployment to become healthy
      - name: Wait for health
        id: health-check
        run: |
          # Generate a Railway-provided domain via GraphQL API
          DOMAIN_PAYLOAD=$(jq -n \
            --arg sid "$RAILWAY_SERVICE_ID" \
            --arg eid "$RAILWAY_ENVIRONMENT_ID" \
            '{query: "mutation ($sid: String!, $eid: String!) { serviceDomainCreate(input: {serviceId: $sid, environmentId: $eid}) { domain } }",
              variables: {sid: $sid, eid: $eid}}')
          DOMAIN_RESULT=$(curl -sf -X POST "$RAILWAY_API" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$DOMAIN_PAYLOAD")
          echo "Domain API Response: $DOMAIN_RESULT"

          DEPLOY_DOMAIN=$(echo "$DOMAIN_RESULT" | jq -r '.data.serviceDomainCreate.domain')
          if [ -z "$DEPLOY_DOMAIN" ] || [ "$DEPLOY_DOMAIN" = "null" ]; then
            echo "ERROR: Could not generate Railway domain"
            echo "$DOMAIN_RESULT" | jq .
            exit 1
          fi

          DEPLOY_URL="https://$DEPLOY_DOMAIN"
          echo "Deployment URL: $DEPLOY_URL"
          echo "BASE_URL=$DEPLOY_URL" >> "$GITHUB_ENV"

          # Poll /health every 10s for up to 5 minutes
          echo "Waiting for deployment to become healthy..."
          ATTEMPTS=30
          for i in $(seq 1 $ATTEMPTS); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$DEPLOY_URL/health" 2>/dev/null || true)
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Health check passed on attempt $i"
              curl -sf "$DEPLOY_URL/health" | jq .
              exit 0
            fi
            echo "Attempt $i/$ATTEMPTS — got HTTP $HTTP_CODE, retrying in 10s..."
            sleep 10
          done

          echo "ERROR: Deployment did not become healthy after $((ATTEMPTS * 10))s"
          exit 1

      # Run smoke tests
      - name: Run smoke tests
        env:
          AUTH_TOKEN: ${{ env.RANDAL_API_TOKEN }}
        run: |
          chmod +x tests/integration/smoke.sh
          ./tests/integration/smoke.sh

      # Always tear down the Railway project, even on failure
      # NOTE: `railway delete` / `railway project delete` may fail in non-interactive
      # CI when multiple workspaces are accessible. Use the GraphQL API for reliable cleanup.
      - name: Teardown Railway project
        if: always() && steps.create-project.outputs.project_created == 'true'
        run: |
          PROJECT_ID="${{ steps.create-project.outputs.project_id }}"
          echo "Tearing down Railway project: $PROJECT_NAME (ID: $PROJECT_ID)"

          # Fall back to GITHUB_ENV if step output is empty
          if [ -z "$PROJECT_ID" ]; then
            PROJECT_ID="$RAILWAY_PROJECT_ID"
          fi

          if [ -n "$PROJECT_ID" ]; then
            DEL_PAYLOAD=$(jq -n --arg pid "$PROJECT_ID" \
              '{query: "mutation ($pid: String!) { projectDelete(id: $pid) }", variables: {pid: $pid}}')
            RESULT=$(curl -s -X POST "$RAILWAY_API" \
              -H "Authorization: Bearer $RAILWAY_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$DEL_PAYLOAD") || true
            echo "Teardown API Response: $RESULT"
            echo "$RESULT" | jq . 2>/dev/null || echo "$RESULT"
          else
            echo "WARNING: No project ID available — manual cleanup may be needed"
          fi
          echo "Cleanup complete"

      # Summary
      - name: Post results summary
        if: always()
        run: |
          echo "## Integration Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Project**: \`$PROJECT_NAME\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status**: \`${{ job.status }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Triggered by**: \`${{ github.event_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Branch**: \`${{ github.head_ref || github.ref_name }}\`" >> "$GITHUB_STEP_SUMMARY"
